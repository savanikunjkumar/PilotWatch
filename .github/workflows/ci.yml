name: PilotWatch CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Concurrency group ensures that if multiple commits are pushed quickly, 
# older CI runs are cancelled to save GitHub Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip" # Caches pip dependencies to speed up subsequent runs

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        
        # CRITICAL: Install CPU-only PyTorch for CI. 
        # Downloading CUDA binaries in CI takes too long and isn't needed for basic logic tests.
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        
        # Install remaining project dependencies
        pip install -r requirements.txt
        
        # Install testing and linting tools
        pip install pytest pytest-cov black flake8

    - name: Enforce Formatting (Black)
      run: |
        # Checks if code matches Black's style guide. Fails if unformatted.
        black --check src/ tests/

    - name: Lint Code (Flake8)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all other issues as warnings (Black handles standard formatting)
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Run Unit Tests
      run: |
        # Executes fast, isolated logic checks (data loaders, tensor shapes, RAG prompts)
        # Includes code coverage reporting for the src/ directory
        pytest tests/unit/ --cov=src/ --cov-report=term-missing

    - name: Run Smoke Tests
      run: |
        # Executes end-to-end pipelines (train -> validate -> export) on tiny synthetic datasets
        # Ensures no syntax errors exist in the heavy training loops before deployment
        pytest tests/smoke/ -v
